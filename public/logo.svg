<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180">
  <defs>
    <linearGradient id="leafGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <!-- Background subtle circle -->
  <circle cx="75" cy="90" r="68" fill="#ecfdf5" opacity="0.5"/>

  <!-- Stack of leaves / layers forming an "EcoStack" icon -->
  <!-- Bottom leaf (base) -->
  <path d="M38 112 C38 112, 30 100, 35 90 C40 80, 50 78, 58 84 C66 78, 76 80, 81 90 C86 100, 78 112, 78 112 Z"
        fill="url(#leafGrad1)" opacity="0.9"/>

  <!-- Middle leaf -->
  <path d="M42 92 C42 92, 35 82, 40 72 C45 62, 53 60, 58 65 C63 60, 71 62, 76 72 C81 82, 74 92, 74 92 Z"
        fill="url(#leafGrad2)" opacity="0.95"/>

  <!-- Top leaf -->
  <path d="M47 74 C47 74, 41 65, 46 56 C51 47, 57 45, 58 50 C59 45, 65 47, 70 56 C75 65, 69 74, 69 74 Z"
        fill="url(#leafGrad3)"/>

  <!-- Small accent dot above -->
  <circle cx="58" cy="46" r="3" fill="#34d399"/>

  <!-- Company name -->
  <text x="110" y="82" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="42" font-weight="700" fill="#064e3b" letter-spacing="-1">Eco</text>
  <text x="208" y="82" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="42" font-weight="300" fill="#059669" letter-spacing="-1">Stack</text>

  <!-- Tagline -->
  <text x="112" y="108" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" fill="#6b7280" letter-spacing="3.5" font-weight="400">THE GREEN TECH DIRECTORY</text>

  <!-- Decorative line under -->
  <line x1="110" y1="118" x2="420" y2="118" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <!-- Badge: Verified green -->
  <rect x="110" y="128" rx="12" ry="12" width="105" height="22" fill="#d1fae5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="127" y="143" font-family="'Inter', sans-serif" font-size="10" fill="#047857" font-weight="600">🌱 Verified Green</text>
</svg>